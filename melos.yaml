name: ap_common
repository: https://github.com/abc873693/ap_common
sdkPath: .fvm/flutter_sdk

packages:
  - apps/**
  - packages/**

command:
  version:
    fetchTags: false
    # Generate commit links in package changelogs.
    linkToCommits: true
    # Only allow versioning to happen on master branch.
    branch: master
    # Additionally build a changelog at the root of the workspace.
    workspaceChangelog: true

  bootstrap:
    # It seems so that running "pub get" in parallel has some issues (like
    # https://github.com/dart-lang/pub/issues/3404). Disabling this feature
    # makes the CI much more stable.
    runPubGetInParallel: false
    usePubspecOverrides: true

scripts:
  analyze:
    exec: dart analyze .
  clean:
    run: melos clean
  release:
    run: melos version --yes
    description: Prepare a production release (merges from release branch to master).
  release:dev:
    run: melos version --prerelease --yes
    description: Prepare a development/prerelease.
  fix:
    run: |
      melos exec -c 1 -- \
        dart fix --apply
    description: |
      Run `dart fix --apply` in all packages.
  format:
    run: |
      melos exec -c 1 -- \
        dart format .
    description: |
      Run `dart format` in all packages.
  format-check:
    run: |
      melos exec -c 1 -- \
        dart format . --set-exit-if-changed --output=none
    description: |
      Run `dart format` check in all packages.
  analyze-ci:
    run: |
      melos exec -c 1 -- \
        dart analyze . --fatal-infos
    description: |
      Run `dart analyze` in all packages.
       - Note: you can also rely on your IDEs Dart Analysis / Issues window.
  test:
    run: |
      melos exec -c 6 --fail-fast -- \
        "flutter test"
    description: Run `flutter test` for a specific package.
    packageFilters:
      dirExists:
        - test
  pub-check:
    run: |
      melos exec -c 1 --no-private --ignore="*example*" -- \
                  dart pub publish --dry-run